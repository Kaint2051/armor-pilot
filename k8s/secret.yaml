apiVersion: v1
kind: Secret
metadata:
  name: varmor-console-secret
  namespace: default
type: Opaque
# IMPORTANT: Replace these values with strong credentials before deploying.
# Use: kubectl create secret generic varmor-console-secret \
#        --from-literal=ADMIN_USER=<your-user> \
#        --from-literal=ADMIN_PASS=<your-strong-password> \
#        --from-literal=VARMOR_LICENSE_PUBLIC_KEY=<base64-ed25519-public-key>
stringData:
  ADMIN_USER: "admin"
  ADMIN_PASS: "REPLACE_WITH_STRONG_PASSWORD"
  # Public key only. Keep the private signing key offline.
  VARMOR_LICENSE_PUBLIC_KEY: ""
