apiVersion: apps/v1
kind: Deployment
metadata:
  name: varmor-console
  namespace: default
  labels:
    app: varmor-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: varmor-console
  template:
    metadata:
      labels:
        app: varmor-console
    spec:
      serviceAccountName: varmor-console-sa

      containers:
        - name: varmor-console
          image: varmor-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # Load credentials from the Secret
          env:
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: varmor-console-secret
                  key: ADMIN_USER
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: varmor-console-secret
                  key: ADMIN_PASS
            - name: APPARMOR_LOG_PATH
              value: /var/log-host/kern.log

          volumeMounts:
            - name: kern-log
              mountPath: /var/log-host
              readOnly: true
            - name: sqlite-data
              mountPath: /app/data

          # Harden the container
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: kern-log
          hostPath:
            path: /var/log
            type: Directory
        - name: sqlite-data
          hostPath:
            path: /var/lib/varmor-console
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: varmor-console-svc
  namespace: default
  labels:
    app: varmor-console
spec:
  type: NodePort
  selector:
    app: varmor-console
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080   # Access via http://<node-ip>:30080
