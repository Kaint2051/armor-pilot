apiVersion: apps/v1
kind: Deployment
metadata:
  name: armor-pilot
  namespace: default
  labels:
    app: armor-pilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: armor-pilot
  template:
    metadata:
      labels:
        app: armor-pilot
    spec:
      serviceAccountName: armor-pilot-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: data-permissions
          image: ghcr.io/kaint2051/armor-pilot-enterprise:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10001:10001 /app/data && chmod 0700 /app/data
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data

      containers:
        - name: armor-pilot
          image: ghcr.io/kaint2051/armor-pilot-enterprise:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # Created from the private .env file by scripts/deploy.sh or deploy.ps1.
          envFrom:
            - secretRef:
                name: armor-pilot-secret

          volumeMounts:
            - name: kern-log
              mountPath: /var/log-host
              readOnly: true
            - name: varmor-log
              mountPath: /var/log-varmor
              readOnly: true
            - name: sqlite-data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp

          # Harden the container
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: kern-log
          hostPath:
            path: /var/log
            type: Directory
        - name: varmor-log
          hostPath:
            path: /var/log/varmor
            type: DirectoryOrCreate
        - name: sqlite-data
          hostPath:
            path: /var/lib/armor-pilot
            type: DirectoryOrCreate
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: armor-pilot-svc
  namespace: default
  labels:
    app: armor-pilot
spec:
  type: NodePort
  selector:
    app: armor-pilot
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080   # Access via http://<node-ip>:30080
