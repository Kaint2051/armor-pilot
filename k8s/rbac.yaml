apiVersion: v1
kind: ServiceAccount
metadata:
  name: varmor-console-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: varmor-console-role
rules:
  # Read Deployments across all namespaces
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

  # Full control over VarmorPolicy CRDs
  - apiGroups: ["crd.varmor.org"]
    resources: ["varmorpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read namespace list (optional – for future namespace picker feature)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: varmor-console-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: varmor-console-role
subjects:
  - kind: ServiceAccount
    name: varmor-console-sa
    namespace: default
