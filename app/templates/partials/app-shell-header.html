<!-- DASHBOARD -->
<div id="pg-dash" class="hidden min-h-screen flex flex-col">
  <header class="sticky top-0 z-20" style="background:rgba(15,23,42,.96);backdrop-filter:blur(8px);border-bottom:1px solid #1e293b">
    <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 min-h-14 py-2 flex flex-wrap lg:flex-nowrap items-center justify-between gap-2 lg:gap-4">
      <div class="order-1 flex items-center gap-2.5 shrink-0">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:#2563eb">
          <svg class="w-4 h-4" style="color:#fff" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <span class="font-bold text-base tracking-tight" style="color:#f1f5f9">vArmor Console</span>
      </div>
      <div class="order-3 lg:order-2 w-full lg:w-auto flex items-center gap-2">
        <span class="text-xs hidden sm:block" style="color:#64748b">Namespace</span>
        <input id="inp-ns" value="default" class="form-input" style="width:min(12rem,calc(100vw - 6rem));padding:.35rem .625rem;font-size:.8rem"/>
        <button onclick="loadAll()" class="btn btn-primary btn-sm">Load</button>
      </div>
      <div class="order-4 lg:order-3 w-full lg:w-auto flex items-center gap-1 overflow-x-auto shrink-0 pb-1 lg:pb-0">
        <button id="tab-btn-dashboard" class="tab-btn" onclick="switchTab('dashboard')">
          <svg class="w-3.5 h-3.5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Dashboard
        </button>
        <button id="tab-btn-policy" class="tab-btn tab-active" onclick="switchTab('policy')">
          <svg class="w-3.5 h-3.5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          Policy
        </button>
        <button id="tab-btn-logs" class="tab-btn" onclick="switchTab('logs')">
          <svg class="w-3.5 h-3.5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          Logs
        </button>
        <button id="tab-btn-users" class="tab-btn" onclick="switchTab('users')">
          <svg class="w-3.5 h-3.5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          Access Control
        </button>
        <div class="w-px h-5 mx-2" style="background:#334155"></div>
        <span id="lbl-user" class="text-sm hidden sm:block" style="color:#64748b"></span>
        <span id="license-badge" class="badge badge-gray hidden">License</span>
        <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="flex-1">
