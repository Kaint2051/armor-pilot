apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "armor-pilot.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "armor-pilot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: armor-pilot
  template:
    metadata:
      labels:
        app: armor-pilot
        {{- include "armor-pilot.labels" . | nindent 8 }}
    spec:
      serviceAccountName: armor-pilot-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: data-permissions
          image: {{ include "armor-pilot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - chown -R 10001:10001 /app/data && chmod 0700 /app/data
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data

      containers:
        - name: armor-pilot
          image: {{ include "armor-pilot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}

          volumeMounts:
            - name: kern-log
              mountPath: /var/log-host
              readOnly: true
            - name: varmor-log
              mountPath: /var/log-varmor
              readOnly: true
            - name: sqlite-data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp

          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: kern-log
          hostPath:
            path: {{ .Values.logs.kernPath }}
            type: Directory
        - name: varmor-log
          hostPath:
            path: {{ .Values.logs.varmorPath }}
            type: DirectoryOrCreate
        - name: sqlite-data
          hostPath:
            path: {{ .Values.data.hostPath }}
            type: DirectoryOrCreate
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
