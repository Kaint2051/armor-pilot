name: Publish ArmorPilot container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - edition: community
            image: armor-pilot
          - edition: enterprise
            image: armor-pilot-enterprise
    env:
      ARMORPILOT_LICENSE_PUBLIC_KEY_B64: ${{ secrets.ARMORPILOT_LICENSE_PUBLIC_KEY_B64 }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and publish
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          build-args: |
            PRODUCT_EDITION=${{ matrix.edition }}
            BUILD_REVISION=${{ github.sha }}
            ARMORPILOT_LICENSE_PUBLIC_KEY_B64=${{ env.ARMORPILOT_LICENSE_PUBLIC_KEY_B64 }}
